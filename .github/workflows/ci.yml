name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: gofmt check
        run: |
          files=$(gofmt -l .)
          if [ -n "$files" ]; then
            echo "Unformatted files:"
            echo "$files"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

  test:
    name: Test (Go ${{ matrix.go }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        go: ['1.25']  # go.mod requires >= 1.25.0; older toolchains can't build (GOTOOLCHAIN=local)
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: go test
        run: go test ./...

  e2e:
    name: E2E (Forgejo container, Linux only)
    runs-on: ubuntu-latest  # macOS runners have no Docker daemon — E2E is Linux-only
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: go test -tags=e2e
        run: go test -tags=e2e -timeout 15m ./cmd/cifra/...

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache: true

      - name: Build smoke test
        run: make build
