version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gosec
  settings:
    gosec:
      excludes:
        - G304  # file path from variable — intentional in a secrets CLI

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/MicheleColella/cifra-cli

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
